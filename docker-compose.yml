services:

  frontend:
    build:
      context: ./frontend
    container_name: frontend

  backend:
    image: clue/json-server
    container_name: backend
    volumes:
      - ./frontend/server/db.json:/data/db.json
    command: json-server --host 0.0.0.0 --watch /data/db.json --port 3001
    ports:
     